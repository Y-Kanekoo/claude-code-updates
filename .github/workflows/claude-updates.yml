name: Claude Code Updates Report

on:
  # 毎日 9:00 JST (0:00 UTC) に自動実行
  schedule:
    - cron: '0 0 * * *'

  # 手動実行も可能
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-report:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Python 3.11 をセットアップ
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 依存パッケージをインストール
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: レポートを生成
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python scripts/check-claude-updates.py

      - name: 変更を確認
        id: check_changes
        run: |
          if [[ -n $(git status --porcelain) ]]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            # 新しいレポートのバージョンを取得（最新のファイル名から抽出）
            latest_report=$(ls -t reports/claude-code/*.md 2>/dev/null | head -n 1)
            if [[ -n "$latest_report" ]]; then
              version=$(basename "$latest_report" | grep -oE 'v[0-9]+\.[0-9]+\.[0-9]+' || echo "latest")
              echo "version=$version" >> $GITHUB_OUTPUT
            else
              echo "version=latest" >> $GITHUB_OUTPUT
            fi
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: 変更をコミット＆プッシュ
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "[docs] Claude Code ${{ steps.check_changes.outputs.version }} の更新レポートを追加"
          git push
